name: founder-os CI

on:
  pull_request:
    paths:
      - "founder-os/**"
      - ".claude-plugin/marketplace.json"
      - "scripts/local-ci/**"
      - ".github/workflows/ci.yml"
  push:
    branches: [main]
    paths:
      - "founder-os/**"
      - ".claude-plugin/marketplace.json"
      - "scripts/local-ci/**"

permissions:
  contents: read

jobs:
  validate-json:
    name: Validate JSON config files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate policy.json, .mcp.json, hooks.json, plugin.json, settings.json
        run: |
          set -euo pipefail
          for f in founder-os/policy.json founder-os/.mcp.json founder-os/hooks/hooks.json \
                   founder-os/.claude-plugin/plugin.json founder-os/settings.json \
                   founder-os/schema/policy.schema.json \
                   .claude-plugin/marketplace.json; do
            echo "Validating $f"
            node -e "JSON.parse(require('fs').readFileSync('$f'))"
          done

  policy-tests:
    name: Policy engine tests (both adapters, same fixture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: founder-os/package-lock.json
      - name: Install dev dependencies
        working-directory: founder-os
        run: npm install
      - name: Validate policy.json schema
        working-directory: founder-os
        run: npm run validate:policy-schema
      - name: Check JS syntax across the repo
        working-directory: founder-os
        run: npm run check:js-syntax
      - name: Scan tracked files for leaked secrets
        working-directory: founder-os
        run: npm run scan:secrets
      - name: Audit dependencies for known vulnerabilities
        working-directory: founder-os
        run: npm run audit:deps
      - name: Lint harness structural health (skills/agents/commands/policy.json)
        working-directory: founder-os
        run: npm run lint:harness
      - name: Run core policy-engine unit tests
        working-directory: founder-os
        run: npm run test:core
      - name: Run schema validation regression tests
        working-directory: founder-os
        run: npm run test:schema
      - name: Run Claude Code adapter tests
        working-directory: founder-os
        run: npm run test:claude-code
      - name: Run OpenCode adapter tests (parity check)
        working-directory: founder-os
        run: npm run test:opencode
      - name: Run bash hook tests (verify-gate.sh, doc-sync.sh)
        working-directory: founder-os
        run: npm run test:hooks
      - name: Run settings.json-driven behavior tests
        working-directory: founder-os
        run: npm run test:settings
      - name: Run ReDoS guard-rail tests
        working-directory: founder-os
        run: npm run test:redos-guard
      - name: Run audit log tests
        working-directory: founder-os
        run: npm run test:audit-log
      - name: Run companion server tests
        working-directory: founder-os
        run: npm run test:companion
      - name: Run repo scan tests (check-js-syntax.js, scan-secrets.js)
        working-directory: founder-os
        run: npm run test:repo-scans
      - name: Run harness structural health lint tests
        working-directory: founder-os
        run: npm run test:lint-harness
      - name: Run PRD quality gate tests
        working-directory: founder-os
        run: npm run test:lint-prd
      - name: Run CI/local-ci drift check
        working-directory: founder-os
        run: npm run test:ci-drift
      - name: Check version sync across package.json/plugin.json/marketplace.json
        working-directory: founder-os
        run: npm run check:version-sync
      - name: Typecheck OpenCode adapter
        working-directory: founder-os
        run: npm run typecheck:opencode

  shellcheck:
    name: Shellcheck bin/*.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run ShellCheck
        # Pinned to the 2.0.0 release commit, not the mutable @master ref.
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38
        with:
          scandir: "./founder-os/bin"
